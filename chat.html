<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (!localStorage.getItem('ats_session')) {
      window.location.href = 'auth/login.html';
    }
  </script>
  <script>
    (function() {
      const t = localStorage.getItem('ats_theme') || 'aurora-pink';
      const f = localStorage.getItem('ats_font') || 'modern-saas';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.setAttribute('data-font', f);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI ATS Pro – AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/chat.css">
  <script src="js/main.js" defer></script>
  <script src="js/navigation.js" defer></script>
  <script src="js/services/storage.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/services/jobs.js" defer></script>
  <script src="js/chat.js" defer></script>
  <script src="js/theme-switcher.js" defer></script>
  <script src="auth/session.js" defer></script>
</head>
<body data-page="chat">
  <div id="navbarMount"></div>
  <main id="page-chat" class="page">
    <div class="section-label" style="margin-bottom:8px">AI CAREER COACH</div>
    <h1 class="section-title" style="margin-bottom:24px;font-size:clamp(22px,3vw,32px)">Chat with <span class="gradient-text">AI Assistant</span></h1>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="quick-btns">
      <button class="btn btn-g btn-sm" data-quick-prompt="How do I improve my ATS score?">How to improve ATS score?</button>
      <button class="btn btn-g btn-sm" data-quick-prompt="What skills are in demand for 2025?">Top skills for 2025?</button>
      <button class="btn btn-g btn-sm" data-quick-prompt="How to prepare for technical interviews?">Technical interview tips</button>
      <button class="btn btn-g btn-sm" data-quick-prompt="Write a professional summary for a fresher">Write my summary</button>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" type="text" placeholder="Ask about resumes, interviews, careers, skills...">
      <button class="btn btn-p chat-send" id="chatSendBtn">→</button>
    </div>
  </main>
</body>
</html>
